upstream backend_upstream {
    server backend:4000;
}

server {
    listen 80;
    server_name _;

    # ─── 1. Serve React Frontend (Static Build) ───────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ─── 2. Proxy API Requests to Node.js Backend ─────────────────────
    location /api/ {
        proxy_pass         http://backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # ─── 3. Proxy WebSockets (Critical for Live Alerts & Inference) ───
    location /socket.io/ {
        proxy_pass         http://backend_upstream/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── 4. Health Check Endpoint ─────────────────────────────────────
    location /health {
        proxy_pass http://backend_upstream/health;
    }

    # ─── Static Asset Caching ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
